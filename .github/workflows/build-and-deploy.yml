name: build-and-deploy

on:
  schedule:
    - cron: '23 3,15 * * *' # UTC，每日兩次，避開整點
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Clone upstream data (sparse)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/Kantai235/Final-Fantasy-XIV-Ranking-for-TC.git upstream
          git -C upstream sparse-checkout set data/rankings config
      - run: node scripts/build_data.mjs
        env:
          UPSTREAM_DIR: ./upstream
      - run: node scripts/validate_data.mjs
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
